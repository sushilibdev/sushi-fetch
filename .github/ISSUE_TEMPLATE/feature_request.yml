name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas!
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What is your proposed solution?
      description: A clear and concise description of the feature or improvement you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Have you considered any alternatives?
      description: Any other ways to solve this problem that you've thought of?
  - type: textarea
    id: usage
    attributes:
      label: Example Usage
      description: Show us how you'd like to use this feature (code examples are great!).
